<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <style>
      text { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; }
    </style>
  </defs>

  <!-- Page background -->
  <rect width="1280" height="800" fill="#0d1117"/>

  <!-- ── Header ── -->
  <rect x="0" y="0" width="1280" height="54" fill="#161b22"/>
  <line x1="0" y1="54" x2="1280" y2="54" stroke="#30363d" stroke-width="1"/>
  <!-- Logo -->
  <text x="28" y="34" font-size="22" font-weight="800" fill="#58a6ff">⚡ AaveFlash</text>
  <!-- Subtitle -->
  <text x="175" y="34" font-size="14" fill="#8b949e">Cross-Chain Arbitrage Dashboard</text>
  <!-- Status badge -->
  <rect x="1168" y="18" width="84" height="22" rx="11" fill="#f85149"/>
  <text x="1210" y="33" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">STOPPED</text>

  <!-- ── Sidebar ── -->
  <rect x="0" y="54" width="260" height="746" fill="#161b22"/>
  <line x1="260" y1="54" x2="260" y2="800" stroke="#30363d" stroke-width="1"/>

  <!-- Bot Control card -->
  <rect x="16" y="74" width="228" height="80" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="36" y="96" font-size="12" font-weight="700" fill="#8b949e" letter-spacing="1">BOT CONTROL</text>
  <rect x="36" y="104" width="188" height="36" rx="8" fill="#3fb950"/>
  <text x="130" y="127" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">▶  Start Bot</text>

  <!-- Chain card -->
  <rect x="16" y="170" width="228" height="76" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="36" y="192" font-size="12" font-weight="700" fill="#8b949e" letter-spacing="1">CHAIN</text>
  <rect x="36" y="200" width="188" height="32" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="221" font-size="13" fill="#e6edf3">Ethereum</text>
  <text x="210" y="221" font-size="11" fill="#8b949e">▼</text>

  <!-- Parameters card -->
  <rect x="16" y="262" width="228" height="200" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="36" y="284" font-size="12" font-weight="700" fill="#8b949e" letter-spacing="1">PARAMETERS</text>
  <!-- Loan Amount -->
  <text x="36" y="306" font-size="12" fill="#8b949e">Loan Amount (USD)</text>
  <rect x="36" y="312" width="188" height="30" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="331" font-size="13" fill="#e6edf3">10000</text>
  <!-- Min Profit -->
  <text x="36" y="360" font-size="12" fill="#8b949e">Min Profit (bps)</text>
  <rect x="36" y="366" width="188" height="30" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="385" font-size="13" fill="#e6edf3">15</text>
  <!-- Scan Interval -->
  <text x="36" y="414" font-size="12" fill="#8b949e">Scan Interval (ms)</text>
  <rect x="36" y="420" width="188" height="30" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="439" font-size="13" fill="#e6edf3">2000</text>
  <!-- Trade Live -->
  <rect x="36" y="456" width="16" height="16" rx="3" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="60" y="469" font-size="12" fill="#e6edf3">Trade Live</text>

  <!-- ── Main content ── -->

  <!-- ── Stat cards row ── -->
  <!-- Total Scans -->
  <rect x="284" y="74" width="218" height="84" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="304" y="100" font-size="13" fill="#8b949e">Total Scans</text>
  <text x="304" y="138" font-size="28" font-weight="700" fill="#58a6ff">0</text>

  <!-- Total Profit -->
  <rect x="518" y="74" width="218" height="84" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="538" y="100" font-size="13" fill="#8b949e">Total Profit</text>
  <text x="538" y="138" font-size="28" font-weight="700" fill="#3fb950">$0</text>

  <!-- Loan Amount -->
  <rect x="752" y="74" width="218" height="84" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="772" y="100" font-size="13" fill="#8b949e">Loan Amount</text>
  <text x="772" y="138" font-size="28" font-weight="700" fill="#d29922">$10,000</text>

  <!-- Active Chain -->
  <rect x="986" y="74" width="270" height="84" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="1006" y="100" font-size="13" fill="#8b949e">Active Chain</text>
  <text x="1006" y="138" font-size="28" font-weight="700" fill="#58a6ff">Ethereum</text>

  <!-- ── Profit Chart card ── -->
  <rect x="284" y="178" width="972" height="310" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="304" y="204" font-size="12" font-weight="700" fill="#8b949e" letter-spacing="1">PROFIT PER SCAN (USD)</text>

  <!-- Chart grid lines -->
  <g stroke="#30363d" stroke-width="0.8" stroke-dasharray="4 4">
    <line x1="340" y1="230" x2="1236" y2="230"/>
    <line x1="340" y1="270" x2="1236" y2="270"/>
    <line x1="340" y1="310" x2="1236" y2="310"/>
    <line x1="340" y1="350" x2="1236" y2="350"/>
    <line x1="340" y1="390" x2="1236" y2="390"/>
    <line x1="340" y1="430" x2="1236" y2="430"/>
    <line x1="340" y1="470" x2="1236" y2="470"/>
  </g>

  <!-- Y-axis labels -->
  <text x="330" y="234" font-size="11" fill="#8b949e" text-anchor="end">50</text>
  <text x="330" y="274" font-size="11" fill="#8b949e" text-anchor="end">30</text>
  <text x="330" y="314" font-size="11" fill="#8b949e" text-anchor="end">10</text>
  <text x="330" y="354" font-size="11" fill="#8b949e" text-anchor="end">0</text>
  <text x="330" y="394" font-size="11" fill="#8b949e" text-anchor="end">-10</text>
  <text x="330" y="434" font-size="11" fill="#8b949e" text-anchor="end">-20</text>
  <text x="330" y="474" font-size="11" fill="#8b949e" text-anchor="end">-30</text>

  <!-- Chart line (profit curve) -->
  <polyline
    fill="none"
    stroke="#58a6ff"
    stroke-width="2"
    stroke-linejoin="round"
    points="
      340,400 386,345 432,290 478,355 524,300 570,380 616,260 662,330 708,290 754,350
      800,310 846,265 892,305 938,340 984,270 1030,295 1076,340 1122,280 1168,315 1214,290 1236,310
    "
  />

  <!-- X-axis time labels (representative) -->
  <text x="340" y="490" font-size="11" fill="#8b949e" text-anchor="middle">12:01</text>
  <text x="432" y="490" font-size="11" fill="#8b949e" text-anchor="middle">12:03</text>
  <text x="524" y="490" font-size="11" fill="#8b949e" text-anchor="middle">12:05</text>
  <text x="616" y="490" font-size="11" fill="#8b949e" text-anchor="middle">12:07</text>
  <text x="708" y="490" font-size="11" fill="#8b949e" text-anchor="middle">12:09</text>
  <text x="800" y="490" font-size="11" fill="#8b949e" text-anchor="middle">12:11</text>
  <text x="892" y="490" font-size="11" fill="#8b949e" text-anchor="middle">12:13</text>
  <text x="984" y="490" font-size="11" fill="#8b949e" text-anchor="middle">12:15</text>
  <text x="1076" y="490" font-size="11" fill="#8b949e" text-anchor="middle">12:17</text>
  <text x="1168" y="490" font-size="11" fill="#8b949e" text-anchor="middle">12:19</text>

  <!-- ── RPC / API Status card ── -->
  <rect x="284" y="508" width="972" height="126" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="304" y="534" font-size="12" font-weight="700" fill="#8b949e" letter-spacing="1">RPC / API STATUS</text>

  <!-- Ethereum - Connected -->
  <rect x="304" y="548" width="216" height="72" rx="8" fill="#1a2e1a" stroke="#3fb950" stroke-width="1"/>
  <text x="412" y="578" font-size="13" font-weight="600" fill="#e6edf3" text-anchor="middle">ethereum</text>
  <text x="412" y="598" font-size="11" fill="#3fb950" text-anchor="middle">● Connected</text>

  <!-- Polygon - Connected -->
  <rect x="536" y="548" width="216" height="72" rx="8" fill="#1a2e1a" stroke="#3fb950" stroke-width="1"/>
  <text x="644" y="578" font-size="13" font-weight="600" fill="#e6edf3" text-anchor="middle">polygon</text>
  <text x="644" y="598" font-size="11" fill="#3fb950" text-anchor="middle">● Connected</text>

  <!-- Arbitrum - Disconnected -->
  <rect x="768" y="548" width="216" height="72" rx="8" fill="#2e1a1a" stroke="#f85149" stroke-width="1"/>
  <text x="876" y="578" font-size="13" font-weight="600" fill="#e6edf3" text-anchor="middle">arbitrum</text>
  <text x="876" y="598" font-size="11" fill="#f85149" text-anchor="middle">● Disconnected</text>

  <!-- BSC - Connected -->
  <rect x="1000" y="548" width="236" height="72" rx="8" fill="#1a2e1a" stroke="#3fb950" stroke-width="1"/>
  <text x="1118" y="578" font-size="13" font-weight="600" fill="#e6edf3" text-anchor="middle">bsc</text>
  <text x="1118" y="598" font-size="11" fill="#3fb950" text-anchor="middle">● Connected</text>

</svg>
